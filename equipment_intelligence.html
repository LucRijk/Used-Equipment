<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>CAT Equipment — Competitor Intelligence</title>
<style>
  /* System fonts — no internet required */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow:   #F5C400;
    --black:    #111111;
    --offwhite: #F2EFE9;
    --mid:      #888;
    --border:   #DEDBD4;
    --card-bg:  #FAFAF7;
    --blue:     #1A5FC4;
    --red:      #C41A1A;
    --green:    #1A7A3C;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--offwhite);
    color: var(--black);
    min-height: 100vh;
  }

  /* ── Header ── */
  .site-header {
    background: var(--black);
    padding: 0 2rem;
    display: flex;
    align-items: stretch;
    gap: 0;
    border-bottom: 3px solid var(--yellow);
  }
  .header-cat {
    background: var(--yellow);
    color: var(--black);
    font-family: 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace;
    font-weight: 700;
    font-size: 1.5rem;
    letter-spacing: .04em;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    margin-right: 1.5rem;
    flex-shrink: 0;
  }
  .header-text { padding: 1rem 0; }
  .header-title { color: #fff; font-size: 1rem; font-weight: 600; letter-spacing: .01em; }
  .header-sub   { color: rgba(255,255,255,.45); font-size: .75rem; margin-top: 2px; font-family: 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace; }

  /* ── Layout ── */
  .main { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* ── Category nav ── */
  .cat-nav {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .cat-btn {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: .78rem;
    font-weight: 500;
    cursor: pointer;
    color: #555;
    transition: all .12s;
    font-family: inherit;
    white-space: nowrap;
  }
  .cat-btn:hover { border-color: var(--black); color: var(--black); }
  .cat-btn.active { background: var(--black); border-color: var(--black); color: var(--yellow); }

  /* ── Section title ── */
  .section-title {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: baseline;
    gap: .75rem;
  }
  .section-title .fam-tag {
    font-size: .7rem;
    font-family: 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace;
    background: var(--yellow);
    color: var(--black);
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 600;
    letter-spacing: .04em;
    vertical-align: middle;
  }

  /* ── Size class grid ── */
  .sc-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .sc-row {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .sc-head {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 11px 16px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1.5px solid transparent;
    transition: background .1s;
  }
  .sc-head:hover { background: #fafaf7; }
  .sc-row.open .sc-head { border-bottom-color: var(--border); background: #fafaf7; }

  .sc-name {
    font-family: 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace;
    font-size: .85rem;
    font-weight: 500;
    color: var(--black);
  }
  .sc-range {
    font-size: .72rem;
    color: var(--mid);
    font-family: 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace;
    background: var(--offwhite);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .sc-mfr-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    flex: 1;
  }
  .mfr-pill {
    font-size: .7rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 12px;
    background: #F0EDE6;
    color: #444;
    white-space: nowrap;
  }
  .mfr-pill.tier-a { background: #111; color: #fff; }
  .mfr-pill.tier-b { background: #E8F0FB; color: #1A5FC4; }
  .sc-toggle {
    font-size: .7rem;
    color: var(--mid);
    flex-shrink: 0;
    font-family: 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace;
  }

  /* ── Expanded detail ── */
  .sc-body { display: none; padding: 14px 16px; }
  .sc-row.open .sc-body { display: block; }

  .mfr-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
    gap: 8px;
  }
  .mfr-card {
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 11px;
    background: var(--card-bg);
  }
  .mfr-card.primary {
    background: #FFFBEA;
    border-color: #D4AF00;
  }
  .mfr-card-name {
    font-size: .68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: #555;
    margin-bottom: 6px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
  }
  .mfr-card.primary .mfr-card-name { color: #8B6800; }
  .model-tags { display: flex; flex-wrap: wrap; gap: 3px; }
  .model-tag {
    font-family: 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace;
    font-size: .68rem;
    background: #EDEDEA;
    color: #444;
    padding: 2px 6px;
    border-radius: 3px;
    line-height: 1.5;
  }

  /* category section */
  .category-section { display: none; }
  .category-section.active { display: block; }

  /* compact competitor count */
  .sc-meta { display: flex; align-items: center; gap: 10px; }
  .ccount {
    font-size: .7rem;
    font-family: 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace;
    color: var(--mid);
    white-space: nowrap;
  }
  .ccount.low  { color: var(--green); }
  .ccount.mid  { color: #B07000; }
  .ccount.high { color: var(--red); }
</style>
</head>

// ── RENDER ────────────────────────────────────────────────────────────────────
const nav = document.getElementById('catNav');
const sections = document.getElementById('sections');

DATA.forEach((cat, ci) => {
  // Nav button
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (ci === 0 ? ' active' : '');
  btn.textContent = cat.label;
  btn.onclick = () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.category-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sec-' + cat.id).classList.add('active');
  };
  nav.appendChild(btn);

  // Section
  const sec = document.createElement('div');
  sec.className = 'category-section' + (ci === 0 ? ' active' : '');
  sec.id = 'sec-' + cat.id;

  const title = document.createElement('div');
  title.className = 'section-title';
  title.innerHTML = cat.family + ' <span class="fam-tag">CAT size classes</span>';
  sec.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'sc-grid';

  cat.classes.forEach(sc => {
    const tierA = sc.competitors.filter(c => c.tier === 'a');
    const tierB = sc.competitors.filter(c => c.tier === 'b');
    const total = sc.competitors.length;
    const countClass = total <= 3 ? 'low' : total <= 6 ? 'mid' : 'high';

    const row = document.createElement('div');
    row.className = 'sc-row';

    // Pills for header (just names, no models)
    const pills = sc.competitors.map(c =>
      `<span class="mfr-pill ${c.tier === 'a' ? 'tier-a' : 'tier-b'}">${c.name.split(' ')[0].split('/')[0].trim()}</span>`
    ).join('');

    row.innerHTML = `
      <div class="sc-head" onclick="this.closest('.sc-row').classList.toggle('open')">
        <div class="sc-meta">
          <span class="sc-name">${sc.sc}</span>
          <span class="sc-range">${sc.range}</span>
        </div>
        <div class="sc-mfr-pills">${pills}</div>
        <span class="sc-toggle ccount ${countClass}">${total} competitors ▸</span>
      </div>
      <div class="sc-body"></div>
    `;

    // Build expanded card grid lazily
    const body = row.querySelector('.sc-body');
    let built = false;
    row.querySelector('.sc-head').addEventListener('click', () => {
      if (built) return;
      built = true;
      const mfrGrid = document.createElement('div');
      mfrGrid.className = 'mfr-grid';
      sc.competitors.forEach(c => {
        const card = document.createElement('div');
        card.className = 'mfr-card' + (c.tier === 'a' ? ' primary' : '');
        card.innerHTML = `
          <div class="mfr-card-name">${c.name}</div>
          <div class="model-tags">${c.models.map(m => `<span class="model-tag">${m}</span>`).join('')}</div>
        `;
        mfrGrid.appendChild(card);
      });
      body.appendChild(mfrGrid);
    });

    grid.appendChild(row);
  });

  sec.appendChild(grid);
  sections.appendChild(sec);
});
